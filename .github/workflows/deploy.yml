name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a manual deploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # command: deploy   # (default) runs `wrangler deploy` using wrangler.toml
